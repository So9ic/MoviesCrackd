<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MoviesCrackd - Minimal Cinema Player</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #050508;
      --control-bg: rgba(10, 10, 16, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-solid: #a855f7;
      --accent-glow: linear-gradient(135deg, #a855f7, #6366f1);
      --text-main: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: none;
    }

    /* ── Mobile Orientation Rotation Lock (Landscape Force) ── */
    @media (max-width: 900px) and (orientation: portrait) {
      #app-viewport {
        width: 100vh !important;
        height: 100vw !important;
        transform: rotate(90deg);
        transform-origin: top left;
        position: absolute;
        top: 0;
        left: 100vw;
        overflow: hidden;
      }
    }
    
    @media (min-width: 901px) or (orientation: landscape) {
      #app-viewport {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }
    }

    /* ── Video Player Container ── */
    .player-container {
      width: 100%;
      height: 100%;
      background: #000;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 5;
    }

    .player-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Customize HTML5 Captions/Subtitles Styling natively */
    video::cue {
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      border-radius: 4px;
      padding: 4px 8px;
    }

    /* ── Controls HUD Overlay ── */
    .controls-overlay {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px 32px;
      background: linear-gradient(180deg, 
        rgba(0, 0, 0, 0.8) 0%, 
        transparent 20%, 
        transparent 80%, 
        rgba(0, 0, 0, 0.85) 100%);
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
      pointer-events: none;
    }

    .controls-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .controls-overlay * {
      pointer-events: auto;
    }

    /* ── Header Bar ── */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .movie-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      max-width: 70%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .engine-badge {
      background: var(--control-bg);
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      backdrop-filter: blur(12px);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* ── Play/Pause HUD Pulse Indicator ── */
    .hud-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 150;
      pointer-events: none;
    }

    .hud-icon-wrap {
      background: rgba(10, 10, 16, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      transform: scale(0.5);
      backdrop-filter: blur(8px);
    }

    .hud-icon-wrap.animate {
      animation: hud-pulse 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes hud-pulse {
      0% { opacity: 0; transform: scale(0.6); }
      40% { opacity: 1; transform: scale(1.05); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.4); }
    }

    .hud-icon-wrap svg {
      width: 36px;
      height: 36px;
    }

    /* ── Loading Overlay ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    .loading-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4.5px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-solid);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer Bar & Timeline ── */
    .footer-bar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .timeline-container {
      width: 100%;
      display: flex;
      align-items: center;
      position: relative;
    }

    .seek-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.16);
      outline: none;
      cursor: pointer;
      transition: height 0.2s;
    }

    .seek-slider:hover {
      height: 8px;
    }

    .seek-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-solid);
      box-shadow: 0 0 10px var(--accent-solid);
      transition: transform 0.1s;
    }

    .seek-slider::-webkit-slider-thumb:hover {
      transform: scale(1.25);
    }

    /* ── Playback Controls ── */
    .playback-controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 20px;
    }

    .controls-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .controls-section.left {
      flex: 1;
      justify-content: flex-start;
    }

    .controls-section.center {
      justify-content: center;
      gap: 24px;
    }

    .controls-section.right {
      flex: 1;
      justify-content: flex-end;
      gap: 12px;
    }

    /* Control Buttons styling */
    .control-btn {
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      transition: background 0.25s, color 0.25s;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .control-btn svg {
      width: 22px;
      height: 22px;
    }

    .control-btn.active-cc {
      color: #d8b4fe;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    /* Volume Slider Container */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .volume-slider {
      -webkit-appearance: none;
      width: 70px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: width 0.25s;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
    }

    /* Play/Pause Button in Center */
    .play-btn {
      background: #fff;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s, background-color 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.08);
      background-color: #f3e8ff;
    }

    .play-btn svg {
      width: 24px;
      height: 24px;
      margin-left: 2px; /* Slight offset for perfect optical play alignment */
    }

    .play-btn.paused-state svg {
      margin-left: 0;
    }

    /* 5s Skip Buttons */
    .skip-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: color 0.2s;
    }

    .skip-btn:hover {
      color: #fff;
    }

    .skip-btn svg {
      width: 24px;
      height: 24px;
    }

    .btn-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* Time Tracker */
    .time-tracker {
      font-family: monospace;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
    }

    /* ── Dropdown Selectors for Audio & Subtitles ── */
    .selector-container {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      bottom: 50px;
      right: 0;
      background: rgba(15, 15, 24, 0.95);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: 200px;
      display: none;
      flex-direction: column;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(16px);
      z-index: 210;
      overflow: hidden;
    }

    .dropdown-menu.active {
      display: flex;
    }

    .dropdown-header {
      padding: 12px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dropdown-options {
      max-height: 160px;
      overflow-y: auto;
    }

    .dropdown-option {
      padding: 10px 16px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dropdown-option:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
    }

    .dropdown-option.selected {
      color: #d8b4fe;
      font-weight: 600;
      background: rgba(168, 85, 247, 0.15);
    }

    /* Mobile Responsive optimizations */
    @media (max-width: 768px) {
      .controls-overlay {
        padding: 16px 20px;
      }
      .movie-title {
        font-size: 0.95rem;
      }
      .play-btn {
        width: 44px;
        height: 44px;
      }
      .volume-slider {
        width: 0;
        overflow: hidden;
      }
      .volume-container:hover .volume-slider,
      .volume-slider:active {
        width: 60px;
      }
    }
  </style>
</head>
<body>

  <div id="app-viewport">
    <!-- Fullscreen video player -->
    <div class="player-container">
      <video id="cinema-video" autoplay preload="auto" playsinline>
        <track id="player-subtitle-track" kind="subtitles" srclang="en" label="Active Subtitles" default>
      </video>
    </div>

    <!-- Center HUD Pulse indicator -->
    <div class="hud-indicator" id="hud-indicator">
      <div class="hud-icon-wrap" id="hud-icon-wrap"></div>
    </div>

    <!-- Loading spinner -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Auto-hiding controls overlay -->
    <div class="controls-overlay" id="controls-overlay">
      <!-- Top header -->
      <div class="header-bar">
        <div class="movie-title" id="active-title">🎬 Cinema Stream</div>
        <div class="engine-badge" id="engine-badge">🚀 Direct</div>
      </div>

      <!-- Bottom controls -->
      <div class="footer-bar">
        <!-- Progress bar -->
        <div class="timeline-container">
          <input type="range" class="seek-slider" id="seek-slider"
                 min="0" max="100" value="0" step="0.1"
                 oninput="onSliderDrag(this.value)"
                 onchange="onSliderSeek(this.value)">
        </div>

        <div class="playback-controls-row">
          <!-- Left: Timestamps & volume -->
          <div class="controls-section left">
            <span class="time-tracker" id="time-display">00:00:00 / 00:00:00</span>
            
            <div class="volume-container">
              <button class="control-btn" id="volume-btn" onclick="toggleMute()">
                <svg id="volume-icon" viewBox="0 0 24 24">
                  <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
              </button>
              <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="onVolumeChange(this.value)">
            </div>
          </div>

          <!-- Center: <<5 | Play | 5>> -->
          <div class="controls-section center">
            <button class="skip-btn" onclick="seekSkip(-5)">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 12V6l-8.5 6 8.5 6v-6zm.5-6v12l8.5-6L13 6z"/></svg>
              <span class="btn-label">&lt;&lt;5</span>
            </button>
            
            <button class="play-btn" id="play-btn" onclick="togglePlay()">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 19c.3 0 .6-.1.8-.3l9-6c.4-.3.6-.7.6-1.2s-.2-.9-.6-1.2l-9-6c-.5-.3-1.1-.3-1.6 0-.5.3-.8.8-.8 1.4v12c0 .6.3 1.1.8 1.4.2.1.5.2.8.2z"/></svg>
            </button>
            
            <button class="skip-btn" onclick="seekSkip(5)">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 18l8.5-6L4 6v12zm8.5 0l8.5-6-8.5-6v12z"/></svg>
              <span class="btn-label">5&gt;&gt;</span>
            </button>
          </div>

          <!-- Right: Audio Tracks, Subtitles, Engine Mode, Fullscreen -->
          <div class="controls-section right">
            <!-- Audio track dropdown -->
            <div class="selector-container" id="audio-container" style="display: none;">
              <button class="control-btn" id="audio-track-btn" onclick="toggleDropdown('audio-dropdown')">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
              </button>
              <div class="dropdown-menu" id="audio-dropdown">
                <div class="dropdown-header">Audio Language</div>
                <div class="dropdown-options" id="audio-options-list"></div>
              </div>
            </div>

            <!-- Captions dropdown -->
            <div class="selector-container" id="subtitle-container" style="display: none;">
              <button class="control-btn" id="cc-btn" onclick="toggleDropdown('subtitle-dropdown')">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 7H9.5v-.5h-2v3h2V13H11v1.5c0 .83-.67 1.5-1.5 1.5h-2C6.67 16 6 15.33 6 14.5v-3C6 10.67 6.67 10 7.5 10h2c.83 0 1.5.67 1.5 1.5V11zm7 0h-1.5v-.5h-2v3h2V13H18v1.5c0 .83-.67 1.5-1.5 1.5h-2c-.83 0-1.5-.67-1.5-1.5v-3c0-.83.67-1.5 1.5-1.5h2c.83 0 1.5.67 1.5 1.5V11z"/></svg>
              </button>
              <div class="dropdown-menu" id="subtitle-dropdown">
                <div class="dropdown-header">Captions</div>
                <div class="dropdown-options" id="subtitle-options-list"></div>
              </div>
            </div>

            <!-- Engine Mode Toggle (Direct / Compatible) -->
            <button class="control-btn" id="mode-toggle-btn" onclick="togglePlaybackMode()" title="Switch Streaming Engine">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.25z"/></svg>
            </button>

            <!-- Fullscreen -->
            <button class="control-btn" onclick="toggleFullscreen()">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── State ── */
    const video   = document.getElementById('cinema-video');
    const slider  = document.getElementById('seek-slider');
    const timeLbl = document.getElementById('time-display');
    const loader  = document.getElementById('loading-overlay');

    let rawPath   = '';        
    let mode      = 'direct';  
    let seekBase  = 0;         
    let duration  = 0;         
    let dragging  = false;
    let hideTimer = null;
    let seekPending = false;   
    let seekVerifyTimer = null;
    
    let currentAudioTrack = '';
    let currentSubtitleTrack = '';
    let lastVolume = 1;

    /* ── Viewport Forceful Lock and Non-scalable Zoom Defeat ── */
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());
    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    
    let lastTouchEnd = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, false);
    
    document.addEventListener('touchmove', e => {
      // Allow moving inputs but prevent overall background scrolling
      if (!e.target.closest('.dropdown-options') && !e.target.closest('input')) {
        e.preventDefault();
      }
    }, { passive: false });

    /* ── Helpers ── */
    const pad = n => String(Math.floor(n)).padStart(2, '0');
    function fmt(s) {
      if (!s || isNaN(s)) return '00:00:00';
      return `${pad(s/3600)}:${pad((s%3600)/60)}:${pad(s%60)}`;
    }

    function streamUrl(path, ss, m) {
      let url = `/api/stream-remux?path=${encodeURIComponent(path)}&ss=${ss}&mode=${m}`;
      if (currentAudioTrack !== '') {
        url += `&audio_track=${currentAudioTrack}`;
      }
      return url;
    }

    /* ── Video loading ── */
    function loadStream(path, ss, m, autoPlay = true) {
      loader.classList.add('visible');
      seekBase = ss;
      seekPending = true;
      
      slider.value = ss;
      slider.max = duration || ss;
      timeLbl.textContent = `${fmt(ss)} / ${fmt(duration)}`;
      
      video.src = streamUrl(path, ss, m);
      video.load();
      if (autoPlay) {
        const playHandler = () => {
          video.play().catch(() => {});
          video.removeEventListener('canplay', playHandler);
        };
        video.addEventListener('canplay', playHandler);
      }
      
      // Load current subtitles if active
      const trackElement = document.getElementById('player-subtitle-track');
      if (currentSubtitleTrack !== '') {
        trackElement.src = `/api/subtitles?path=${encodeURIComponent(rawPath)}&track=${currentSubtitleTrack}`;
        trackElement.mode = 'showing';
      } else {
        trackElement.src = '';
        trackElement.mode = 'disabled';
      }

      clearTimeout(seekVerifyTimer);
      if (ss > 5) {
        seekVerifyTimer = setTimeout(() => {
          if (video.currentTime > 1 && video.currentTime < 8 && seekBase > 30) {
            console.warn(`[Seek Verify] Seek to ${ss}s failed. Resetting seekBase to 0.`);
            seekBase = 0;
          }
          seekPending = false;
        }, 6000);
      }
    }

    video.addEventListener('waiting', () => {
      loader.classList.add('visible');
    });

    video.addEventListener('playing', () => {
      loader.classList.remove('visible');
      if (seekPending) {
        seekPending = false;
        clearTimeout(seekVerifyTimer);
      }
    });

    /* ── Timeline sync ── */
    video.addEventListener('timeupdate', () => {
      if (dragging) return;
      if (video.readyState < 3) return;
      if (seekPending) return;
      
      const elapsed = seekBase + video.currentTime;
      const total   = duration || elapsed;
      slider.max   = total;
      slider.value = elapsed;
      timeLbl.textContent = `${fmt(elapsed)} / ${fmt(duration)}`;
    });

    /* ── Slider interaction ── */
    function onSliderDrag(v) {
      dragging = true;
      timeLbl.textContent = `${fmt(v)} / ${fmt(duration)}`;
    }

    function onSliderSeek(v) {
      dragging = false;
      doSeek(parseFloat(v));
    }

    function seekSkip(offset) {
      const now  = seekBase + video.currentTime;
      let target = now + offset;
      if (target < 0) target = 0;
      if (duration && target > duration) target = duration - 1;
      
      // HUD skip flash animation
      flashHudIcon(offset > 0 ? 'forward' : 'rewind');
      doSeek(target);
    }

    let seekDebounce = null;
    function doSeek(seconds) {
      if (!rawPath) return;
      clearTimeout(seekDebounce);
      seekDebounce = setTimeout(() => {
        const wasPlaying = !video.paused;
        loadStream(rawPath, seconds, mode, wasPlaying);
      }, 150);
    }

    /* ── Play / Pause ── */
    function togglePlay() {
      if (video.paused) {
        video.play().catch(() => {});
        flashHudIcon('play');
      } else {
        video.pause();
        flashHudIcon('pause');
      }
      updatePlayBtnUI();
    }

    function updatePlayBtnUI() {
      const btn = document.getElementById('play-btn');
      if (video.paused) {
        btn.classList.add('paused-state');
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 19c.3 0 .6-.1.8-.3l9-6c.4-.3.6-.7.6-1.2s-.2-.9-.6-1.2l-9-6c-.5-.3-1.1-.3-1.6 0-.5.3-.8.8-.8 1.4v12c0 .6.3 1.1.8 1.4.2.1.5.2.8.2z"/></svg>`;
      } else {
        btn.classList.remove('paused-state');
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4c.55 0 1-.45 1-1V6c0-.55-.45-1-1-1H6c-.55 0-1 .45-1 1v12c0 .55.45 1 1 1zm8-13v12c0 .55.45 1 1 1h4c.55 0 1-.45 1-1V6c0-.55-.45-1-1-1h-4c-.55 0-1 .45-1 1z"/></svg>`;
      }
    }

    video.addEventListener('play', updatePlayBtnUI);
    video.addEventListener('pause', updatePlayBtnUI);

    /* ── Play/Pause HUD Animation Flash ── */
    function flashHudIcon(type) {
      const wrap = document.getElementById('hud-icon-wrap');
      wrap.classList.remove('animate');
      void wrap.offsetWidth; // Trigger reflow to restart animation
      
      let svg = '';
      if (type === 'play') {
        svg = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>`;
      } else if (type === 'pause') {
        svg = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
      } else if (type === 'forward') {
        svg = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 18l8.5-6L4 6v12zm8.5 0l8.5-6-8.5-6v12z"/></svg>`;
      } else if (type === 'rewind') {
        svg = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 12V6l-8.5 6 8.5 6v-6zm.5-6v12l8.5-6L13 6z"/></svg>`;
      }
      
      wrap.innerHTML = svg;
      wrap.classList.add('animate');
    }

    /* ── Volume management ── */
    function onVolumeChange(val) {
      video.volume = val;
      if (val > 0) lastVolume = val;
      updateVolumeIcon(val);
    }

    function toggleMute() {
      if (video.volume > 0) {
        onVolumeChange(0);
        document.getElementById('volume-slider').value = 0;
      } else {
        onVolumeChange(lastVolume);
        document.getElementById('volume-slider').value = lastVolume;
      }
    }

    function updateVolumeIcon(val) {
      const icon = document.getElementById('volume-icon');
      if (val == 0) {
        icon.innerHTML = `<path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
      } else if (val < 0.5) {
        icon.innerHTML = `<path fill="currentColor" d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>`;
      } else {
        icon.innerHTML = `<path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
      }
    }

    /* ── Dropdown Handlers ── */
    function toggleDropdown(id) {
      const activeMenu = document.getElementById(id);
      const isAlreadyActive = activeMenu.classList.contains('active');
      closeAllDropdowns();
      if (!isAlreadyActive) {
        activeMenu.classList.add('active');
      }
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.selector-container')) {
        closeAllDropdowns();
      }
    });

    /* ── Engine Switching ── */
    function togglePlaybackMode() {
      const newMode = mode === 'direct' ? 'compat' : 'direct';
      mode = newMode;
      
      const badge = document.getElementById('engine-badge');
      badge.textContent = newMode === 'compat' ? '🛡️ Compatible' : '🚀 Direct';
      
      const btn = document.getElementById('mode-toggle-btn');
      if (newMode === 'compat') {
        btn.classList.add('active-cc');
      } else {
        btn.classList.remove('active-cc');
      }

      if (rawPath) {
        const now = seekBase + video.currentTime;
        const wasPlaying = !video.paused;
        loadStream(rawPath, now, mode, wasPlaying);
      }
    }

    /* ── Dynamic Tracks setup ── */
    function fetchMediaMetadata(path) {
      fetch(`/api/duration?path=${encodeURIComponent(path)}`)
        .then(r => r.json())
        .then(d => {
          duration = d.duration || 0;
          slider.max = duration;
          timeLbl.textContent = `00:00:00 / ${fmt(duration)}`;
          setupAudioTrackDropdown(d.audio_tracks || []);
          setupSubtitleDropdown(d.subtitle_tracks || []);
        })
        .catch(() => { duration = 0; });
    }

    function setupAudioTrackDropdown(tracks) {
      const list = document.getElementById('audio-options-list');
      const container = document.getElementById('audio-container');
      list.innerHTML = '';
      
      if (tracks.length <= 1) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'block';

      // Default (track 0)
      const defOpt = document.createElement('div');
      defOpt.className = 'dropdown-option' + (currentAudioTrack === '' ? ' selected' : '');
      defOpt.textContent = 'Default Track';
      defOpt.onclick = () => {
        currentAudioTrack = '';
        closeAllDropdowns();
        reloadStreamWithTrack();
      };
      list.appendChild(defOpt);

      tracks.forEach(t => {
        const opt = document.createElement('div');
        opt.className = 'dropdown-option' + (String(currentAudioTrack) === String(t.index) ? ' selected' : '');
        opt.textContent = t.title;
        opt.onclick = () => {
          currentAudioTrack = t.index;
          closeAllDropdowns();
          reloadStreamWithTrack();
        };
        list.appendChild(opt);
      });
    }

    function reloadStreamWithTrack() {
      if (!rawPath) return;
      const now = seekBase + video.currentTime;
      const wasPlaying = !video.paused;
      loadStream(rawPath, now, mode, wasPlaying);
      
      // Update checkmark positions
      fetchMediaMetadata(rawPath);
    }

    function setupSubtitleDropdown(tracks) {
      const list = document.getElementById('subtitle-options-list');
      const container = document.getElementById('subtitle-container');
      list.innerHTML = '';

      if (tracks.length === 0) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'block';

      // Subtitles Off
      const offOpt = document.createElement('div');
      offOpt.className = 'dropdown-option' + (currentSubtitleTrack === '' ? ' selected' : '');
      offOpt.textContent = 'Off';
      offOpt.onclick = () => {
        currentSubtitleTrack = '';
        closeAllDropdowns();
        applySubtitleTrack();
      };
      list.appendChild(offOpt);

      tracks.forEach(t => {
        const opt = document.createElement('div');
        opt.className = 'dropdown-option' + (String(currentSubtitleTrack) === String(t.index) ? ' selected' : '');
        opt.textContent = t.title;
        opt.onclick = () => {
          currentSubtitleTrack = t.index;
          closeAllDropdowns();
          applySubtitleTrack();
        };
        list.appendChild(opt);
      });
    }

    function applySubtitleTrack() {
      const trackElement = document.getElementById('player-subtitle-track');
      const ccBtn = document.getElementById('cc-btn');
      
      if (currentSubtitleTrack === '') {
        trackElement.src = '';
        trackElement.mode = 'disabled';
        ccBtn.classList.remove('active-cc');
      } else {
        trackElement.src = `/api/subtitles?path=${encodeURIComponent(rawPath)}&track=${currentSubtitleTrack}`;
        trackElement.mode = 'showing';
        ccBtn.classList.add('active-cc');
      }
      fetchMediaMetadata(rawPath);
    }

    /* ── Fullscreen toggle ── */
    function toggleFullscreen() {
      const container = document.getElementById('app-viewport');
      if (!document.fullscreenElement) {
        container.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    /* ── Overlay Auto-hide ── */
    function showControls() {
      const overlay = document.getElementById('controls-overlay');
      overlay.classList.remove('hidden');
      document.body.style.cursor = 'default';
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        if (!video.paused && !dragging && !document.querySelector('.dropdown-menu.active')) {
          overlay.classList.add('hidden');
          document.body.style.cursor = 'none';
        }
      }, 3500);
    }

    document.addEventListener('mousemove', showControls);
    document.addEventListener('click', showControls);
    document.addEventListener('touchstart', showControls);

    /* ── Keyboard Shortcuts ── */
    document.addEventListener('keydown', e => {
      switch (e.key) {
        case ' ':
          e.preventDefault();
          togglePlay();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          seekSkip(-5);
          break;
        case 'ArrowRight':
          e.preventDefault();
          seekSkip(5);
          break;
        case 'f':
          e.preventDefault();
          toggleFullscreen();
          break;
      }
    });

    /* ── Initial Boot ── */
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const urlParam = params.get('url');
      const nameParam = params.get('name');
      
      if (urlParam) {
        let decoded = urlParam;
        try {
          while (decoded.includes('%')) {
            const next = decodeURIComponent(decoded);
            if (next === decoded) break;
            decoded = next;
          }
        } catch (e) {}
        rawPath = decoded;
        
        let decodedName = nameParam || 'Cinema Stream';
        try {
          while (decodedName.includes('%')) {
            const next = decodeURIComponent(decodedName);
            if (next === decodedName) break;
            decodedName = next;
          }
        } catch (e) {}
        
        document.getElementById('active-title').textContent = `🎬 ${decodedName}`;
        fetchMediaMetadata(rawPath);
        loadStream(rawPath, 0, mode, true);
        showControls();
      } else {
        document.getElementById('active-title').textContent = '⚠️ No stream URL provided';
        loader.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
