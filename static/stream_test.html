<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MoviesCrackd - Minimal Cinema Player</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #050508;
      --control-bg: rgba(10, 10, 16, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-solid: #a855f7;
      --accent-glow: linear-gradient(135deg, #a855f7, #6366f1);
      --text-main: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: none;
    }

    /* ── Mobile Orientation Rotation Lock (Landscape Force) ── */
    @media (max-width: 900px) and (orientation: portrait) {
      #app-viewport {
        width: 100vh !important;
        height: 100vw !important;
        transform: rotate(90deg);
        transform-origin: top left;
        position: absolute;
        top: 0;
        left: 100vw;
        overflow: hidden;
      }
    }
    
    @media (min-width: 901px) or (orientation: landscape) {
      #app-viewport {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }
    }

    /* ── Video Player Container ── */
    .player-container {
      width: 100%;
      height: 100%;
      background: #000;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 5;
    }

    .player-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Customize HTML5 Captions/Subtitles Styling natively */
    video::cue {
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      border-radius: 4px;
      padding: 4px 8px;
    }

    /* ── Controls HUD Overlay ── */
    .controls-overlay {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px 32px;
      background: linear-gradient(180deg, 
        rgba(0, 0, 0, 0.8) 0%, 
        transparent 20%, 
        transparent 80%, 
        rgba(0, 0, 0, 0.85) 100%);
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
      pointer-events: none;
    }

    .controls-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .controls-overlay * {
      pointer-events: auto;
    }

    /* ── Header Bar ── */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .movie-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      max-width: 70%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .engine-badge {
      background: var(--control-bg);
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      backdrop-filter: blur(12px);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* ── Play/Pause HUD Pulse Indicator ── */
    .hud-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 150;
      pointer-events: none;
    }

    .hud-icon-wrap {
      background: rgba(10, 10, 16, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      transform: scale(0.5);
      backdrop-filter: blur(8px);
    }

    .hud-icon-wrap.animate {
      animation: hud-pulse 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes hud-pulse {
      0% { opacity: 0; transform: scale(0.6); }
      40% { opacity: 1; transform: scale(1.05); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.4); }
    }

    .hud-icon-wrap svg {
      width: 36px;
      height: 36px;
    }

    /* ── Loading Overlay ── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    .loading-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4.5px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-solid);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer Bar & Timeline ── */
    .footer-bar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .timeline-container {
      width: 100%;
      display: flex;
      align-items: center;
      position: relative;
    }

    .seek-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.16);
      outline: none;
      cursor: pointer;
      transition: height 0.2s;
    }

    .seek-slider:hover {
      height: 8px;
    }

    .seek-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-solid);
      box-shadow: 0 0 10px var(--accent-solid);
      transition: transform 0.1s;
    }

    .seek-slider::-webkit-slider-thumb:hover {
      transform: scale(1.25);
    }

    /* ── Playback Controls ── */
    .playback-controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 20px;
    }

    .controls-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .controls-section.left {
      flex: 1;
      justify-content: flex-start;
    }

    .controls-section.center {
      justify-content: center;
      gap: 24px;
    }

    .controls-section.right {
      flex: 1;
      justify-content: flex-end;
      gap: 12px;
    }

    /* Control Buttons styling */
    .control-btn {
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      transition: background 0.25s, color 0.25s;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .control-btn svg {
      width: 22px;
      height: 22px;
    }

    .control-btn.active-cc {
      color: #d8b4fe;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    /* Volume Slider Container */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .volume-slider {
      -webkit-appearance: none;
      width: 70px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: width 0.25s;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
    }

    /* Play/Pause Button in Center */
    .play-btn {
      background: #fff;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s, background-color 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.08);
      background-color: #f3e8ff;
    }

    .play-btn svg {
      width: 24px;
      height: 24px;
      margin-left: 2px; /* Slight offset for perfect optical play alignment */
    }

    .play-btn.paused-state svg {
      margin-left: 0;
    }

    /* 5s Skip Buttons */
    .skip-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: color 0.2s;
    }

    .skip-btn:hover {
      color: #fff;
    }

    .skip-btn svg {
      width: 24px;
      height: 24px;
    }

    .btn-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* Time Tracker */
    .time-tracker {
      font-family: monospace;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
    }

    /* ── Dropdown Selectors for Audio & Subtitles ── */
    .selector-container {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      bottom: 50px;
      right: 0;
      background: rgba(15, 15, 24, 0.95);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: 200px;
      display: none;
      flex-direction: column;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(16px);
      z-index: 210;
      overflow: hidden;
    }

    .dropdown-menu.active {
      display: flex;
    }

    .dropdown-header {
      padding: 12px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dropdown-options {
      max-height: 160px;
      overflow-y: auto;
    }

    .dropdown-option {
      padding: 10px 16px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dropdown-option:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
    }

    .dropdown-option.selected {
      color: #d8b4fe;
      font-weight: 600;
      background: rgba(168, 85, 247, 0.15);
    }

    /* Mobile Responsive optimizations */
    @media (max-width: 768px) {
      .controls-overlay {
        padding: 16px 20px;
      }
      .movie-title {
        font-size: 0.95rem;
      }
      .play-btn {
        width: 44px;
        height: 44px;
      }
      .volume-slider {
        width: 0;
        overflow: hidden;
      }
      .volume-container:hover .volume-slider,
      .volume-slider:active {
        width: 60px;
      }
    }
  </style>
</head>
<body>

  <div id="app-viewport">
    <!-- Fullscreen video player -->
    <div class="player-container">
      <video id="cinema-video" autoplay preload="auto" playsinline>
        <track id="player-subtitle-track" kind="subtitles" srclang="en" label="Active Subtitles" default>
      </video>
    </div>

    <!-- Center HUD Pulse indicator -->
    <div class="hud-indicator" id="hud-indicator">
      <div class="hud-icon-wrap" id="hud-icon-wrap"></div>
    </div>

    <!-- Loading spinner -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Auto-hiding controls overlay -->
    <div class="controls-overlay" id="controls-overlay">
      <!-- Top header -->
      <div class="header-bar">
        <div class="movie-title" id="active-title">🎬 Cinema Stream</div>
        <div class="engine-badge" id="engine-badge">🚀 Direct</div>
      </div>

      <!-- Bottom controls -->
      <div class="footer-bar">
        <!-- Progress bar -->
        <div class="timeline-container">
          <input type="range" class="seek-slider" id="seek-slider"
                 min="0" max="100" value="0" step="0.1"
                 oninput="onSliderDrag(this.value)"
                 onchange="onSliderSeek(this.value)">
        </div>

        <div class="playback-controls-row">
          <!-- Left: Timestamps & volume -->
          <div class="controls-section left">
            <span class="time-tracker" id="time-display">00:00:00 / 00:00:00</span>
            
            <div class="volume-container">
              <button class="control-btn" id="volume-btn" onclick="toggleMute()">
                <svg id="volume-icon" viewBox="0 0 24 24">
                  <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
              </button>
              <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="onVolumeChange(this.value)">
            </div>
          </div>

          <!-- Center: <<5 | Play | 5>> -->
          <div class="controls-section center">
            <button class="skip-btn" onclick="seekSkip(-5)">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 12V6l-8.5 6 8.5 6v-6zm.5-6v12l8.5-6L13 6z"/></svg>
              <span class="btn-label">&lt;&lt;5</span>
            </button>
            
            <button class="play-btn" id="play-btn" onclick="togglePlay()">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 19c.3 0 .6-.1.8-.3l9-6c.4-.3.6-.7.6-1.2s-.2-.9-.6-1.2l-9-6c-.5-.3-1.1-.3-1.6 0-.5.3-.8.8-.8 1.4v12c0 .6.3 1.1.8 1.4.2.1.5.2.8.2z"/></svg>
            </button>
            
            <button class="skip-btn" onclick="seekSkip(5)">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 18l8.5-6L4 6v12zm8.5 0l8.5-6-8.5-6v12z"/></svg>
              <span class="btn-label">5&gt;&gt;</span>
            </button>
          </div>

          <!-- Right: Audio Tracks, Subtitles, Engine Mode, Fullscreen -->
          <div class="controls-section right">
            <!-- Audio track dropdown -->
            <div class="selector-container" id="audio-container" style="display: none;">
              <button class="control-btn" id="audio-track-btn" onclick="toggleDropdown('audio-dropdown')">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
              </button>
              <div class="dropdown-menu" id="audio-dropdown">
                <div class="dropdown-header">Audio Language</div>
                <div class="dropdown-options" id="audio-options-list"></div>
              </div>
            </div>

            <!-- Captions dropdown -->
            <div class="selector-container" id="subtitle-container" style="display: none;">
              <button class="control-btn" id="cc-btn" onclick="toggleDropdown('subtitle-dropdown')">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 7H9.5v-.5h-2v3h2V13H11v1.5c0 .83-.67 1.5-1.5 1.5h-2C6.67 16 6 15.33 6 14.5v-3C6 10.67 6.67 10 7.5 10h2c.83 0 1.5.67 1.5 1.5V11zm7 0h-1.5v-.5h-2v3h2V13H18v1.5c0 .83-.67 1.5-1.5 1.5h-2c-.83 0-1.5-.67-1.5-1.5v-3c0-.83.67-1.5 1.5-1.5h2c.83 0 1.5.67 1.5 1.5V11z"/></svg>
              </button>
              <div class="dropdown-menu" id="subtitle-dropdown">
                <div class="dropdown-header">Captions</div>
                <div class="dropdown-options" id="subtitle-options-list"></div>
              </div>
            </div>

            <!-- Engine Mode Toggle (Direct / Compatible) -->
            <button class="control-btn" id="mode-toggle-btn" onclick="togglePlaybackMode()" title="Switch Streaming Engine">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.25z"/></svg>
            </button>

            <!-- Fullscreen -->
            <button class="control-btn" onclick="toggleFullscreen()">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════════
       MSE-Based Streaming Engine — caches chunks in-browser like
       Netflix/YouTube. Seeking within buffered data is instant.
       ═══════════════════════════════════════════════════════════════ */

    class StreamEngine {
      constructor(videoEl) {
        this.video = videoEl;
        this.ms = null;
        this.sb = null;
        this.initSeg = null;
        this.ctrl = null;
        this.queue = [];
        this.busy = false;
        this.mimeType = '';
        this._createMS();
      }

      _createMS() {
        this.ms = new MediaSource();
        this.video.src = URL.createObjectURL(this.ms);
      }

      ready() {
        return new Promise(r => {
          if (this.ms.readyState === 'open') return r();
          this.ms.addEventListener('sourceopen', r, { once: true });
        });
      }

      /* ── Queue-safe SourceBuffer append ── */
      _enqueue(data) {
        return new Promise((ok, fail) => {
          this.queue.push({ data, ok, fail });
          this._drain();
        });
      }
      _drain() {
        if (this.busy || !this.queue.length || !this.sb || this.sb.updating) return;
        this.busy = true;
        const { data, ok, fail } = this.queue.shift();
        const done = () => { rm(); this.busy = false; ok(); this._drain(); };
        const err = () => { rm(); this.busy = false; fail(); this._drain(); };
        const rm = () => { this.sb.removeEventListener('updateend', done); this.sb.removeEventListener('error', err); };
        this.sb.addEventListener('updateend', done);
        this.sb.addEventListener('error', err);
        try { this.sb.appendBuffer(data); }
        catch (e) { rm(); this.busy = false; fail(e); this._drain(); }
      }

      /* ── Parse fMP4 box headers to split init (ftyp+moov) from media (moof+mdat) ── */
      _splitInit(buf) {
        const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
        let pos = 0, end = 0;
        while (pos + 8 <= buf.byteLength) {
          const sz = dv.getUint32(pos);
          if (sz < 8) break;
          const tp = String.fromCharCode(dv.getUint8(pos+4), dv.getUint8(pos+5), dv.getUint8(pos+6), dv.getUint8(pos+7));
          if (tp === 'ftyp' || tp === 'moov' || tp === 'free' || tp === 'skip') { end = pos + sz; pos += sz; }
          else break;
        }
        return { init: buf.slice(0, end), media: buf.slice(end) };
      }

      /* ── Fetch a stream from server and append to SourceBuffer ── */
      async fetchStream(url, seekPos, mime) {
        if (this.ctrl) this.ctrl.abort();
        this.ctrl = new AbortController();
        this.mimeType = mime;

        await this.ready();

        try {
          const res = await fetch(url, { signal: this.ctrl.signal });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const reader = res.body.getReader();
          let first = true;
          let carry = new Uint8Array(0);

          while (true) {
            // Read throttling: if we already have 60 seconds of video buffered ahead,
            // wait before calling reader.read() to trigger TCP/HTTP backpressure.
            while (true) {
              if (this.ctrl.signal.aborted) break;
              const ahead = this.getBufferedAhead(this.video.currentTime);
              if (ahead < 60) break;
              await new Promise(r => setTimeout(r, 500));
            }
            if (this.ctrl.signal.aborted) break;

            const { done, value } = await reader.read();
            if (done) break;

            // Merge with leftover bytes from previous read
            let chunk;
            if (carry.byteLength) {
              chunk = new Uint8Array(carry.byteLength + value.byteLength);
              chunk.set(carry); chunk.set(value, carry.byteLength);
              carry = new Uint8Array(0);
            } else { chunk = value; }

            if (first) {
              // Need enough bytes to parse init segment (usually ~1-4KB)
              if (chunk.byteLength < 512) { carry = chunk; continue; }
              first = false;
              const { init, media } = this._splitInit(chunk);

              if (!this.sb) {
                // First stream ever — create SourceBuffer and save init segment
                this.initSeg = init;
                this.sb = this.ms.addSourceBuffer(mime);
                this.sb.mode = 'segments';
                this.sb.addEventListener('updateend', () => this._drain());
                await this._enqueue(init);
              }
              // else: reuse existing SourceBuffer, skip new init segment

              // Set offset so FFmpeg's 0-based timestamps map to absolute movie time
              while (this.sb.updating) await new Promise(r => this.sb.addEventListener('updateend', r, { once: true }));
              this.sb.timestampOffset = seekPos;

              if (media.byteLength > 0) await this._enqueue(media);
            } else {
              await this._enqueue(chunk);
            }
          }
        } catch (e) {
          if (e.name !== 'AbortError') console.error('[StreamEngine]', e.message);
        }
      }

      /* ── Buffer queries ── */
      isBuffered(t) {
        if (!this.sb || !this.sb.buffered.length) return false;
        for (let i = 0; i < this.sb.buffered.length; i++) {
          if (t >= this.sb.buffered.start(i) + 0.3 && t <= this.sb.buffered.end(i) - 0.3) return true;
        }
        return false;
      }

      getBufferedAhead(t) {
        if (!this.sb || !this.sb.buffered.length) return 0;
        for (let i = 0; i < this.sb.buffered.length; i++) {
          const s = this.sb.buffered.start(i);
          const e = this.sb.buffered.end(i);
          if (t >= s && t <= e) {
            return e - t;
          }
        }
        return 0;
      }

      bufferedEnd() {
        if (!this.sb || !this.sb.buffered.length) return 0;
        let max = 0;
        for (let i = 0; i < this.sb.buffered.length; i++) {
          if (this.sb.buffered.end(i) > max) max = this.sb.buffered.end(i);
        }
        return max;
      }

      /* ── Evict old buffer to cap memory (keep ±120s around current pos) ── */
      async evict(center) {
        if (!this.sb || this.sb.updating) return;
        const lo = Math.max(0, center - 60), hi = center + 120;
        for (let i = 0; i < this.sb.buffered.length; i++) {
          const s = this.sb.buffered.start(i), e = this.sb.buffered.end(i);
          if (e < lo || s > hi) {
            try {
              this.sb.remove(s, e);
              await new Promise(r => this.sb.addEventListener('updateend', r, { once: true }));
            } catch (_) {}
          }
        }
      }

      /* ── Full reset (used when switching audio track or engine mode) ── */
      destroy() {
        if (this.ctrl) this.ctrl.abort();
        this.queue = [];
        this.busy = false;
        this.sb = null;
        this.initSeg = null;
        try {
          if (this.ms.readyState === 'open') this.ms.endOfStream();
        } catch (_) {}
        URL.revokeObjectURL(this.video.src);
        this._createMS();
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       Player UI & State
       ═══════════════════════════════════════════════════════════════ */
    const video   = document.getElementById('cinema-video');
    const slider  = document.getElementById('seek-slider');
    const timeLbl = document.getElementById('time-display');
    const loader  = document.getElementById('loading-overlay');

    let engine    = new StreamEngine(video);
    let rawPath   = '';
    let mode      = 'direct';
    let duration  = 0;
    let dragging  = false;
    let hideTimer = null;
    let currentAudioTrack = '';
    let currentSubtitleTrack = '';
    let lastVolume = 1;
    let seekDebounce = null;

    // MSE MIME type — H.264 High + AAC-LC (covers most MKV sources in copy mode)
    const MSE_MIME = 'video/mp4; codecs="avc1.640028,mp4a.40.2"';

    /* ── Anti-zoom / anti-scroll (mobile) ── */
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());
    document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    let lastTouchEnd = 0;
    document.addEventListener('touchend', e => { const n = Date.now(); if (n - lastTouchEnd <= 300) e.preventDefault(); lastTouchEnd = n; }, false);
    document.addEventListener('touchmove', e => { if (!e.target.closest('.dropdown-options') && !e.target.closest('input')) e.preventDefault(); }, { passive: false });

    /* ── Helpers ── */
    const pad = n => String(Math.floor(n)).padStart(2, '0');
    function fmt(s) {
      if (!s || isNaN(s)) return '00:00:00';
      return `${pad(s/3600)}:${pad((s%3600)/60)}:${pad(s%60)}`;
    }

    function buildStreamUrl(path, ss, m) {
      let url = `/api/stream-remux?path=${encodeURIComponent(path)}&ss=${ss}&mode=${m}`;
      if (currentAudioTrack !== '') url += `&audio_track=${currentAudioTrack}`;
      return url;
    }

    /* ── Load stream into MSE SourceBuffer ── */
    function loadStream(path, ss, m, autoPlay = true) {
      loader.classList.add('visible');
      slider.value = ss;
      slider.max = duration || ss;
      timeLbl.textContent = `${fmt(ss)} / ${fmt(duration)}`;

      const url = buildStreamUrl(path, ss, m);
      engine.fetchStream(url, ss, MSE_MIME);

      if (autoPlay) {
        const h = () => { video.play().catch(() => {}); video.removeEventListener('canplay', h); };
        video.addEventListener('canplay', h);
      }

      // Load subtitles if active
      const track = document.getElementById('player-subtitle-track');
      if (currentSubtitleTrack !== '') {
        track.src = `/api/subtitles?path=${encodeURIComponent(rawPath)}&track=${currentSubtitleTrack}`;
        track.mode = 'showing';
      } else { track.src = ''; track.mode = 'disabled'; }
    }

    /* ── Smart seek — instant if buffered, server fetch if not ── */
    function smartSeek(targetAbs) {
      if (!rawPath) return;
      if (targetAbs < 0) targetAbs = 0;
      if (duration && targetAbs > duration) targetAbs = duration - 1;

      if (engine.isBuffered(targetAbs)) {
        // Data already in browser cache — instant jump, no network!
        video.currentTime = targetAbs;
        slider.value = targetAbs;
        timeLbl.textContent = `${fmt(targetAbs)} / ${fmt(duration)}`;
        return;
      }

      // Outside buffer — fetch from server
      clearTimeout(seekDebounce);
      seekDebounce = setTimeout(() => {
        const wasPlaying = !video.paused;
        loadStream(rawPath, targetAbs, mode, wasPlaying);
      }, 150);
    }

    /* ── Event listeners ── */
    video.addEventListener('waiting', () => loader.classList.add('visible'));
    video.addEventListener('playing', () => loader.classList.remove('visible'));

    video.addEventListener('timeupdate', () => {
      if (dragging) return;
      if (video.readyState < 3) return;
      const t = video.currentTime;
      const total = duration || t;
      slider.max = total;
      slider.value = t;
      timeLbl.textContent = `${fmt(t)} / ${fmt(duration)}`;
      engine.evict(t);
    });

    /* ── Slider interaction ── */
    function onSliderDrag(v) { dragging = true; timeLbl.textContent = `${fmt(v)} / ${fmt(duration)}`; }
    function onSliderSeek(v) { dragging = false; smartSeek(parseFloat(v)); }

    function seekSkip(offset) {
      let target = video.currentTime + offset;
      if (target < 0) target = 0;
      if (duration && target > duration) target = duration - 1;
      flashHudIcon(offset > 0 ? 'forward' : 'rewind');
      smartSeek(target);
    }

    /* ── Play / Pause ── */
    function togglePlay() {
      if (video.paused) { video.play().catch(() => {}); flashHudIcon('play'); }
      else { video.pause(); flashHudIcon('pause'); }
      updatePlayBtnUI();
    }

    function updatePlayBtnUI() {
      const btn = document.getElementById('play-btn');
      if (video.paused) {
        btn.classList.add('paused-state');
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 19c.3 0 .6-.1.8-.3l9-6c.4-.3.6-.7.6-1.2s-.2-.9-.6-1.2l-9-6c-.5-.3-1.1-.3-1.6 0-.5.3-.8.8-.8 1.4v12c0 .6.3 1.1.8 1.4.2.1.5.2.8.2z"/></svg>`;
      } else {
        btn.classList.remove('paused-state');
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4c.55 0 1-.45 1-1V6c0-.55-.45-1-1-1H6c-.55 0-1 .45-1 1v12c0 .55.45 1 1 1zm8-13v12c0 .55.45 1 1 1h4c.55 0 1-.45 1-1V6c0-.55-.45-1-1-1h-4c-.55 0-1 .45-1 1z"/></svg>`;
      }
    }
    video.addEventListener('play', updatePlayBtnUI);
    video.addEventListener('pause', updatePlayBtnUI);

    /* ── HUD Pulse Animation ── */
    function flashHudIcon(type) {
      const wrap = document.getElementById('hud-icon-wrap');
      wrap.classList.remove('animate');
      void wrap.offsetWidth;
      const svgs = {
        play:    '<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>',
        pause:   '<svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>',
        forward: '<svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 18l8.5-6L4 6v12zm8.5 0l8.5-6-8.5-6v12z"/></svg>',
        rewind:  '<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 12V6l-8.5 6 8.5 6v-6zm.5-6v12l8.5-6L13 6z"/></svg>',
      };
      wrap.innerHTML = svgs[type] || '';
      wrap.classList.add('animate');
    }

    /* ── Volume ── */
    function onVolumeChange(val) { video.volume = val; if (val > 0) lastVolume = val; updateVolumeIcon(val); }
    function toggleMute() {
      if (video.volume > 0) { onVolumeChange(0); document.getElementById('volume-slider').value = 0; }
      else { onVolumeChange(lastVolume); document.getElementById('volume-slider').value = lastVolume; }
    }
    function updateVolumeIcon(val) {
      const icon = document.getElementById('volume-icon');
      if (val == 0) icon.innerHTML = `<path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
      else if (val < 0.5) icon.innerHTML = `<path fill="currentColor" d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>`;
      else icon.innerHTML = `<path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`;
    }

    /* ── Dropdown menus ── */
    function toggleDropdown(id) {
      const m = document.getElementById(id);
      const open = m.classList.contains('active');
      closeAllDropdowns();
      if (!open) m.classList.add('active');
    }
    function closeAllDropdowns() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); }
    document.addEventListener('click', e => { if (!e.target.closest('.selector-container')) closeAllDropdowns(); });

    /* ── Engine mode toggle ── */
    function togglePlaybackMode() {
      mode = mode === 'direct' ? 'compat' : 'direct';
      document.getElementById('engine-badge').textContent = mode === 'compat' ? '🛡️ Compatible' : '🚀 Direct';
      const btn = document.getElementById('mode-toggle-btn');
      btn.classList.toggle('active-cc', mode === 'compat');
      if (rawPath) {
        const pos = video.currentTime || 0;
        engine.destroy(); // Full reset — codec may change
        loadStream(rawPath, pos, mode, true);
      }
    }

    /* ── Track management ── */
    function fetchMediaMetadata(path) {
      fetch(`/api/duration?path=${encodeURIComponent(path)}`)
        .then(r => r.json())
        .then(d => {
          duration = d.duration || 0;
          slider.max = duration;
          timeLbl.textContent = `00:00:00 / ${fmt(duration)}`;
          setupAudioTrackDropdown(d.audio_tracks || []);
          setupSubtitleDropdown(d.subtitle_tracks || []);
        })
        .catch(() => { duration = 0; });
    }

    function setupAudioTrackDropdown(tracks) {
      const list = document.getElementById('audio-options-list');
      const ctr = document.getElementById('audio-container');
      list.innerHTML = '';
      if (tracks.length <= 1) { ctr.style.display = 'none'; return; }
      ctr.style.display = 'block';
      const mkOpt = (label, idx) => {
        const el = document.createElement('div');
        el.className = 'dropdown-option' + (String(currentAudioTrack) === String(idx) ? ' selected' : '');
        el.textContent = label;
        el.onclick = () => { currentAudioTrack = idx; closeAllDropdowns(); reloadForTrackChange(); };
        list.appendChild(el);
      };
      mkOpt('Default Track', '');
      tracks.forEach(t => mkOpt(t.title, t.index));
    }

    function reloadForTrackChange() {
      if (!rawPath) return;
      const pos = video.currentTime || 0;
      engine.destroy(); // Audio stream changed — full reset
      loadStream(rawPath, pos, mode, true);
      fetchMediaMetadata(rawPath);
    }

    function setupSubtitleDropdown(tracks) {
      const list = document.getElementById('subtitle-options-list');
      const ctr = document.getElementById('subtitle-container');
      list.innerHTML = '';
      if (tracks.length === 0) { ctr.style.display = 'none'; return; }
      ctr.style.display = 'block';
      const mkOpt = (label, idx) => {
        const el = document.createElement('div');
        el.className = 'dropdown-option' + (String(currentSubtitleTrack) === String(idx) ? ' selected' : '');
        el.textContent = label;
        el.onclick = () => { currentSubtitleTrack = idx; closeAllDropdowns(); applySubtitleTrack(); };
        list.appendChild(el);
      };
      mkOpt('Off', '');
      tracks.forEach(t => mkOpt(t.title, t.index));
    }

    function applySubtitleTrack() {
      const track = document.getElementById('player-subtitle-track');
      const ccBtn = document.getElementById('cc-btn');
      if (currentSubtitleTrack === '') { track.src = ''; track.mode = 'disabled'; ccBtn.classList.remove('active-cc'); }
      else { track.src = `/api/subtitles?path=${encodeURIComponent(rawPath)}&track=${currentSubtitleTrack}`; track.mode = 'showing'; ccBtn.classList.add('active-cc'); }
      fetchMediaMetadata(rawPath);
    }

    /* ── Fullscreen ── */
    function toggleFullscreen() {
      const c = document.getElementById('app-viewport');
      if (!document.fullscreenElement) c.requestFullscreen().catch(() => {});
      else document.exitFullscreen();
    }

    /* ── Controls auto-hide ── */
    function showControls() {
      const o = document.getElementById('controls-overlay');
      o.classList.remove('hidden');
      document.body.style.cursor = 'default';
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        if (!video.paused && !dragging && !document.querySelector('.dropdown-menu.active')) {
          o.classList.add('hidden');
          document.body.style.cursor = 'none';
        }
      }, 3500);
    }
    document.addEventListener('mousemove', showControls);
    document.addEventListener('click', showControls);
    document.addEventListener('touchstart', showControls);

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', e => {
      switch (e.key) {
        case ' ': e.preventDefault(); togglePlay(); break;
        case 'ArrowLeft': e.preventDefault(); seekSkip(-5); break;
        case 'ArrowRight': e.preventDefault(); seekSkip(5); break;
        case 'f': e.preventDefault(); toggleFullscreen(); break;
      }
    });

    /* ── Boot ── */
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const urlParam = params.get('url');
      const nameParam = params.get('name');

      if (urlParam) {
        let decoded = urlParam;
        try { while (decoded.includes('%')) { const n = decodeURIComponent(decoded); if (n === decoded) break; decoded = n; } } catch (_) {}
        rawPath = decoded;

        let decodedName = nameParam || 'Cinema Stream';
        try { while (decodedName.includes('%')) { const n = decodeURIComponent(decodedName); if (n === decodedName) break; decodedName = n; } } catch (_) {}

        document.getElementById('active-title').textContent = `🎬 ${decodedName}`;
        fetchMediaMetadata(rawPath);
        loadStream(rawPath, 0, mode, true);
        showControls();
      } else {
        document.getElementById('active-title').textContent = '⚠️ No stream URL provided';
        loader.classList.remove('visible');
      }
    });
  </script>

</body>
</html>
